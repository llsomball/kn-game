<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Minhoquinha</title>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #222;
        color: white;
        font-family: Arial, sans-serif;
    }

    canvas {
        background-color: #111;
        border: 3px solid #4CAF50;
    }

    h1 {
        margin-bottom: 5px;
    }

    #score {
        margin: 10px;
        font-size: 20px;
    }
</style>
</head>
<body>

<h1>🐍 Minhoquinha Come Maçã</h1>
<div id="score">Pontuação: 0</div>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
const canvasSize = 400;

let snake = [
    { x: 10 * box, y: 10 * box }
];

let direction = "RIGHT";

let apple = {
    x: Math.floor(Math.random() * 20) * box,
    y: Math.floor(Math.random() * 20) * box
};

let score = 0;

document.addEventListener("keydown", changeDirection);

function changeDirection(event) {
    if (event.key === "ArrowUp" && direction !== "DOWN")
        direction = "UP";
    else if (event.key === "ArrowDown" && direction !== "UP")
        direction = "DOWN";
    else if (event.key === "ArrowLeft" && direction !== "RIGHT")
        direction = "LEFT";
    else if (event.key === "ArrowRight" && direction !== "LEFT")
        direction = "RIGHT";
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Desenha a maçã
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(apple.x + box/2, apple.y + box/2, box/2.5, 0, Math.PI * 2);
    ctx.fill();

    // Desenha a minhoquinha
    for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = i === 0 ? "#00FF00" : "#66FF66";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);

        ctx.strokeStyle = "#000";
        ctx.strokeRect(snake[i].x, snake[i].y, box, box);
    }

    let headX = snake[0].x;
    let headY = snake[0].y;

    if (direction === "UP") headY -= box;
    if (direction === "DOWN") headY += box;
    if (direction === "LEFT") headX -= box;
    if (direction === "RIGHT") headX += box;

    // Comeu a maçã?
    if (headX === apple.x && headY === apple.y) {
        score++;
        document.getElementById("score").innerText =
            "Pontuação: " + score;

        apple = {
            x: Math.floor(Math.random() * 20) * box,
            y: Math.floor(Math.random() * 20) * box
        };
    } else {
        snake.pop();
    }

    const newHead = { x: headX, y: headY };

    // Colisão com parede
    if (
        headX < 0 ||
        headY < 0 ||
        headX >= canvasSize ||
        headY >= canvasSize
    ) {
        gameOver();
        return;
    }

    // Colisão consigo mesma
    for (let part of snake) {
        if (part.x === headX && part.y === headY) {
            gameOver();
            return;
        }
    }

    snake.unshift(newHead);
}

function gameOver() {
    clearInterval(game);
    alert("Fim de jogo! Pontuação: " + score);
    location.reload();
}

const game = setInterval(draw, 120);
</script>

</body>
</html>
